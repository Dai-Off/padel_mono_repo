<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pista de pádel — vista cenital
  ================================
  Escala: 1 metro = 100 unidades SVG.
  Pista oficial: 10 m (ancho) × 20 m (largo).
  ViewBox: 1080 × 2080 (40 u de margen para paredes/postes).

  Estructura por capas (todas anidadas en grupos con id, fáciles de
  ocultar/editar en Figma o Illustrator):

    #background      → fondo exterior (oscuro)
    #walls           → perímetro de cristal y rejilla
    #surface         → superficie de juego (rect gris-negro con gradiente sutil)
    #lines           → líneas blancas de pista
    #net             → red + postes + banda blanca + catenaria
    #logo-area       → 2 zonas vacías (cuadrados invisibles) listas para
                       arrastrar tu logo dentro (uno por mitad de pista).

  Para cambiar todos los colores rápidamente, sustituye las variables CSS
  del bloque <style> del <defs>.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1080 2080"
     width="540"
     height="1040"
     role="img"
     aria-label="Pista de pádel — vista cenital">

  <defs>
    <style>
      :root,
      svg {
        /* Paleta editable */
        --color-background:  #0d0d10;
        --color-surface-1:   #2c2c30;
        --color-surface-2:   #232327;
        --color-line:        #ffffff;
        --color-net-mesh:    #141416;
        --color-net-cord:    #ffffff;
        --color-post:        #0a0a0c;
        --color-glass-tint:  rgba(170, 200, 235, 0.28);  /* tinte azul del cristal */
        --color-glass-edge:  #6c7280;                     /* borde de panel (más claro) */
        --color-glass-stud:  #4a4e56;                     /* separadores entre paneles */
        --color-fence-base:  #16161a;                     /* base de la rejilla (oscura) */
        --color-fence-mesh:  rgba(255, 255, 255, 0.14);   /* trazo del enrejado */
      }
    </style>

    <!-- Gradiente sutil de la superficie (apenas visible, evita el "color plano") -->
    <linearGradient id="surfaceGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2c2c30" />
      <stop offset="50%"  stop-color="#232327" />
      <stop offset="100%" stop-color="#2c2c30" />
    </linearGradient>

    <!-- Patrón de malla de la red -->
    <pattern id="netMesh" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#141416" />
      <path d="M0 0 H10 M0 0 V10" stroke="rgba(255,255,255,0.18)" stroke-width="0.6" />
    </pattern>

    <!-- Gradientes de cristal: simulan el reflejo del cristal templado -->
    <linearGradient id="glassGradientH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(220, 235, 255, 0.42)" />
      <stop offset="50%"  stop-color="rgba(170, 200, 235, 0.20)" />
      <stop offset="100%" stop-color="rgba(140, 170, 210, 0.32)" />
    </linearGradient>
    <linearGradient id="glassGradientV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(220, 235, 255, 0.42)" />
      <stop offset="50%"  stop-color="rgba(170, 200, 235, 0.20)" />
      <stop offset="100%" stop-color="rgba(140, 170, 210, 0.32)" />
    </linearGradient>

    <!-- Patrón de rejilla metálica de los laterales (rombos diagonales, mucho más visible) -->
    <pattern id="fenceMesh" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#16161a" />
      <path d="M0 0 L8 8 M8 0 L0 8" stroke="rgba(255,255,255,0.14)" stroke-width="0.9" />
    </pattern>

    <!-- Sombra suave para dar profundidad a la pista -->
    <filter id="surfaceShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <!-- Halo interno suave en cada panel de cristal (le da profundidad) -->
    <filter id="glassInnerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6" />
    </filter>
  </defs>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Fondo exterior                                                     -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <rect id="background" x="0" y="0" width="1080" height="2080" fill="#0d0d10" />

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Paredes (cristal + rejilla + postes)                               -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <g id="walls">

    <!-- Esquinas de cristal (rellenan el hueco entre la pared trasera y -->
    <!-- la lateral, dando continuidad visual a la estructura).           -->
    <g id="corner-glass" stroke="#6c7280" stroke-width="1.5">
      <rect x="20"   y="20"   width="20" height="20" fill="url(#glassGradientH)" />
      <rect x="1040" y="20"   width="20" height="20" fill="url(#glassGradientH)" />
      <rect x="20"   y="2040" width="20" height="20" fill="url(#glassGradientH)" />
      <rect x="1040" y="2040" width="20" height="20" fill="url(#glassGradientH)" />
    </g>

    <!-- Pared trasera SUPERIOR: 5 paneles de cristal (2 m cada uno) -->
    <g id="back-wall-top" stroke="#6c7280" stroke-width="1.5">
      <rect x="40"  y="20" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="240" y="20" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="440" y="20" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="640" y="20" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="840" y="20" width="200" height="20" fill="url(#glassGradientH)" />
    </g>

    <!-- Pared trasera INFERIOR: 5 paneles de cristal -->
    <g id="back-wall-bottom" stroke="#6c7280" stroke-width="1.5">
      <rect x="40"  y="2040" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="240" y="2040" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="440" y="2040" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="640" y="2040" width="200" height="20" fill="url(#glassGradientH)" />
      <rect x="840" y="2040" width="200" height="20" fill="url(#glassGradientH)" />
    </g>

    <!-- Pared lateral IZQUIERDA: 2 paneles de cristal arriba, rejilla en el medio, 2 paneles abajo -->
    <g id="side-wall-left" stroke="#6c7280" stroke-width="1.5">
      <rect x="20" y="40"   width="20" height="200"  fill="url(#glassGradientV)" />
      <rect x="20" y="240"  width="20" height="200"  fill="url(#glassGradientV)" />
      <rect x="20" y="440"  width="20" height="1200" fill="url(#fenceMesh)" />
      <rect x="20" y="1640" width="20" height="200"  fill="url(#glassGradientV)" />
      <rect x="20" y="1840" width="20" height="200"  fill="url(#glassGradientV)" />
    </g>

    <!-- Pared lateral DERECHA: simétrica -->
    <g id="side-wall-right" stroke="#6c7280" stroke-width="1.5">
      <rect x="1040" y="40"   width="20" height="200"  fill="url(#glassGradientV)" />
      <rect x="1040" y="240"  width="20" height="200"  fill="url(#glassGradientV)" />
      <rect x="1040" y="440"  width="20" height="1200" fill="url(#fenceMesh)" />
      <rect x="1040" y="1640" width="20" height="200"  fill="url(#glassGradientV)" />
      <rect x="1040" y="1840" width="20" height="200"  fill="url(#glassGradientV)" />
    </g>

    <!-- Separadores muy sutiles entre paneles (líneas finas contenidas    -->
    <!-- dentro del grosor de la pared, sin sobresalir).                   -->
    <g id="panel-studs" fill="#4a4e56">
      <!-- Pared superior: 4 separadores entre los 5 paneles -->
      <rect x="239" y="20" width="2" height="20" />
      <rect x="439" y="20" width="2" height="20" />
      <rect x="639" y="20" width="2" height="20" />
      <rect x="839" y="20" width="2" height="20" />
      <!-- Pared inferior -->
      <rect x="239" y="2040" width="2" height="20" />
      <rect x="439" y="2040" width="2" height="20" />
      <rect x="639" y="2040" width="2" height="20" />
      <rect x="839" y="2040" width="2" height="20" />
      <!-- Lateral izquierdo: separadores entre cristales y rejilla -->
      <rect x="20" y="239"  width="20" height="2" />
      <rect x="20" y="439"  width="20" height="2" />
      <rect x="20" y="1639" width="20" height="2" />
      <rect x="20" y="1839" width="20" height="2" />
      <!-- Lateral derecho -->
      <rect x="1040" y="239"  width="20" height="2" />
      <rect x="1040" y="439"  width="20" height="2" />
      <rect x="1040" y="1639" width="20" height="2" />
      <rect x="1040" y="1839" width="20" height="2" />
    </g>

  </g>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Superficie de juego                                                -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <rect id="surface"
        x="40" y="40" width="1000" height="2000"
        fill="url(#surfaceGradient)"
        rx="2"
        filter="url(#surfaceShadow)" />

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Líneas de pista (blancas, 7 cm de ancho = 7 unidades)              -->
  <!--   - Líneas de saque horizontales en y=3 m y y=17 m                 -->
  <!--   - Línea central vertical en x=5 m, sobrepasa 0.4 m las líneas    -->
  <!--     de saque (y=2.6..17.4 m), igual que en padelchess.me           -->
  <!--   - Se dibuja ANTES de la red para que la red quede por encima     -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <g id="lines"
     stroke="#ffffff"
     stroke-width="7"
     stroke-linecap="square"
     fill="none">
    <!-- Línea de saque superior (3 m) -->
    <line id="service-line-top"    x1="40"  y1="340"  x2="1040" y2="340" />
    <!-- Línea de saque inferior (17 m) -->
    <line id="service-line-bottom" x1="40"  y1="1740" x2="1040" y2="1740" />
    <!-- Línea central de saque (vertical, en 2 tramos: terminan exactamente
         donde tocan los cordones blancos de la red, y sobresale 0.4 m por
         cada lado de las líneas de saque). -->
    <line id="center-service-line-top"    x1="540" y1="300"  x2="540" y2="968"  />
    <line id="center-service-line-bottom" x1="540" y1="1052" x2="540" y2="1780" />
  </g>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Red (centrada en y=10 m, 1 m de altura visual total)               -->
  <!-- Se dibuja DESPUÉS de las líneas → queda por encima en el centro.   -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <g id="net">
    <!-- Postes de la red, justo fuera de la pista -->
    <rect id="net-post-left"  x="25"   y="950" width="15" height="100" fill="#0a0a0c" />
    <rect id="net-post-right" x="1040" y="950" width="15" height="100" fill="#0a0a0c" />

    <!-- Malla de la red — sigue exactamente la catenaria de los dos cordones
         (arriba dipea de y=958 a y=968, abajo de y=1042 a y=1052) para que
         la rejilla quede siempre contenida entre las dos bandas blancas. -->
    <path id="net-mesh"
          d="M 40 958 Q 540 968 1040 958 L 1040 1042 Q 540 1052 40 1042 Z"
          fill="url(#netMesh)" />

    <!-- Banda blanca superior (cordón) — con leve dip catenario -->
    <path id="net-cord-top"
          d="M 40 958 Q 540 968 1040 958"
          stroke="#ffffff"
          stroke-width="6"
          fill="none"
          stroke-linecap="round" />

    <!-- Banda blanca inferior -->
    <path id="net-cord-bottom"
          d="M 40 1042 Q 540 1052 1040 1042"
          stroke="#ffffff"
          stroke-width="3"
          fill="none"
          stroke-linecap="round" />
  </g>

  <!-- ────────────────────────────────────────────────────────────────── -->
  <!-- Zonas reservadas para el logo                                      -->
  <!-- (rectángulos invisibles, sólo guías para Figma/Illustrator)        -->
  <!-- ────────────────────────────────────────────────────────────────── -->
  <g id="logo-area" fill="none" stroke="none" pointer-events="none">
    <!-- Mitad superior: centrado entre la red y la línea de saque (y=3..10), x≈3..7 m -->
    <rect id="logo-area-top"    x="340" y="500"  width="400" height="300" />
    <!-- Mitad inferior: centrado entre la línea de saque y la red (y=10..17), x≈3..7 m -->
    <rect id="logo-area-bottom" x="340" y="1280" width="400" height="300" />
  </g>

</svg>

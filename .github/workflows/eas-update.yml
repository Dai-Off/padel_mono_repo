# OTA update (EAS Update) en push a main, develop o demo.
# Secrets: EXPO_TOKEN (requerido), SLACK_WEBHOOK_URL (avisos Slack)

name: EAS Update (OTA)

on:
  push:
    branches:
      - main
      - develop
      - demo
    paths:
      - 'mobile-app/**'
      - '.github/workflows/eas-update.yml'
      - '.github/scripts/notify-slack-eas.sh'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Rama / canal a publicar (main, develop, demo)'
        required: true
        default: 'develop'
        type: choice
        options:
          - main
          - develop
          - demo

concurrency:
  group: eas-update-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve branch and channel
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ inputs.branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          case "$BRANCH" in
            main)
              CHANNEL="production"
              ENVIRONMENT="production"
              ENV_KEY="production"
              ;;
            develop)
              CHANNEL="develop"
              ENVIRONMENT="preview"
              ENV_KEY="develop"
              ;;
            demo)
              CHANNEL="demo"
              ENVIRONMENT="preview"
              ENV_KEY="demo"
              ;;
            *)
              echo "Rama no soportada: $BRANCH"
              exit 1
              ;;
          esac

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "env_key=$ENV_KEY" >> "$GITHUB_OUTPUT"
          echo "expo_url=https://expo.dev/accounts/tradebotg/projects/padel-app/branches/${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: EAS Update
        run: |
          MSG="${COMMIT_MESSAGE:-Manual deploy by $GITHUB_ACTOR}"
          eas update \
            --branch "${{ steps.target.outputs.branch }}" \
            --channel "${{ steps.target.outputs.channel }}" \
            --environment "${{ steps.target.outputs.environment }}" \
            --message "$MSG" \
            --non-interactive \
            --json > ../eas-update.json || true
          cat ../eas-update.json 2>/dev/null || true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Notify Slack
        if: success()
        working-directory: .
        run: bash .github/scripts/notify-slack-eas.sh ota "${{ steps.target.outputs.env_key }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BRANCH: ${{ steps.target.outputs.branch }}
          CHANNEL: ${{ steps.target.outputs.channel }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          EXPO_URL: ${{ steps.target.outputs.expo_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

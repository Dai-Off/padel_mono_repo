openapi: 3.0.3
info:
  title: Padel API — Reseñas de club
  version: 1.0.0
  description: |
    Reseñas ligadas a un club: los jugadores (cuenta Supabase vinculada en `players.auth_user_id`)
    crean o actualizan su reseña; dueños de club y administradores listan reseñas y estadísticas por `club_id`.
servers:
  - url: /
tags:
  - name: Club reviews
    description: Valoraciones de jugadores por club
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ClubReviewSummary:
      type: object
      properties:
        average:
          type: number
          format: float
          nullable: true
          description: Media de estrellas (1–5), null si no hay reseñas
        count:
          type: integer
          minimum: 0
        distribution:
          type: object
          additionalProperties: { type: integer }
          description: Conteo por estrella (claves "1" … "5")
          example: { "1": 2, "2": 3, "3": 15, "4": 58, "5": 156 }
    ClubReviewPlayer:
      type: object
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
    ClubReviewListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        player: { $ref: '#/components/schemas/ClubReviewPlayer' }
    ClubReviewRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        club_id: { type: string, format: uuid }
        player_id: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

paths:
  /club-reviews:
    get:
      tags: [Club reviews]
      summary: Listar reseñas del club (dueño / admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: club_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lista y resumen estadístico
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { const: true }
                  summary: { $ref: '#/components/schemas/ClubReviewSummary' }
                  reviews:
                    type: array
                    items: { $ref: '#/components/schemas/ClubReviewListItem' }
              example:
                ok: true
                summary:
                  average: 4.8
                  count: 234
                  distribution: { "1": 2, "2": 3, "3": 15, "4": 58, "5": 156 }
                reviews:
                  - id: "22222222-2222-2222-2222-222222222222"
                    rating: 5
                    comment: Excelentes instalaciones.
                    created_at: "2026-01-28T12:00:00Z"
                    updated_at: "2026-01-28T12:00:00Z"
                    player:
                      id: "33333333-3333-3333-3333-333333333333"
                      first_name: Ana
                      last_name: García
        '400': { description: Falta club_id }
        '401': { description: Sin token }
        '403': { description: Sin acceso al club }

    post:
      tags: [Club reviews]
      summary: Crear o actualizar mi reseña (jugador)
      description: Una sola reseña por jugador y club; si ya existe, se actualiza.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [club_id, rating]
              properties:
                club_id: { type: string, format: uuid }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, maxLength: 4000, nullable: true }
            example:
              club_id: "11111111-1111-1111-1111-111111111111"
              rating: 5
              comment: Muy buen club.
      responses:
        '200':
          description: Reseña guardada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { const: true }
                  review: { $ref: '#/components/schemas/ClubReviewRow' }
        '400': { description: Parámetros inválidos }
        '401': { description: Sin token }
        '403': { description: Usuario sin fila de jugador vinculada }
        '404': { description: Club no existe }

  /club-reviews/{id}:
    patch:
      tags: [Club reviews]
      summary: Editar reseña por id (solo el autor jugador)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, maxLength: 4000, nullable: true }
            example:
              rating: 4
              comment: Actualizo mi opinión.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { const: true }
                  review: { $ref: '#/components/schemas/ClubReviewRow' }
        '400': { description: Sin campos válidos }
        '401': { description: Sin token }
        '403': { description: No autorizado }
        '404': { description: No encontrada }

    delete:
      tags: [Club reviews]
      summary: Eliminar reseña (solo el autor jugador)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { const: true }
        '401': { description: Sin token }
        '403': { description: No autorizado }
        '404': { description: No encontrada }
